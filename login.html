<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – RentSphere</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    /* ── Reset ── */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    
    /* ── Color Variables (same as home page) ── */
    :root {
      --bg: #ffffff;
      --bg2: #f7f8fc;
      --accent: #2563eb;
      --accent2: #1d4ed8;
      --accent-light: #eff6ff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
    }

    /* ── Body ── */
    body {
      background: var(--bg2);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6%;
      height: 68px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 20px rgba(0,0,0,0.06);
    }

    /* Logo */
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--accent);
      text-decoration: none;
    }
    .nav-logo span { color: var(--text); }

    /* Nav links */
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
    }
    .nav-links a {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.25s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* ── Main content area ── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    /* ── Login Card ── */
    .login-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);

      /* Fade-in animation */
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Card Title ── */
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .login-subtitle {
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem;
    }

    /* ── Form Group ── */
    .form-group {
      margin-bottom: 1.2rem;
    }

    /* Label */
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    /* Input fields */
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      background: var(--bg2);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    /* Input focus effect */
    .form-group input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    /* ── Login Button ── */
    .btn-login {
      width: 100%;
      padding: 13px;
      margin-top: 0.8rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 4px 18px rgba(37,99,235,0.25);
    }

    /* Hover animation on Login button */
    .btn-login:hover {
      background: var(--accent2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37,99,235,0.3);
    }

    /* ── Register Link ── */
    .register-link {
      text-align: center;
      margin-top: 1.4rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .register-link a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
    .register-link a:hover { text-decoration: underline; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1.4rem 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Back to Home Button ── */
    .btn-back {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s, transform 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    /* Hover animation on Back button */
    .btn-back:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 6%;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      background: #fff;
    }
  </style>
</head>
<body>

  <!-- ── Navbar ── -->
  <nav>
    <a href="index.html" class="nav-logo">Rent<span>Sphere</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="property.html">Properties</a></li>
      <li><a href="vehicle.html">Vehicles</a></li>
    </ul>
  </nav>

  <!-- ── Main Login Section ── -->
  <div class="main">
    <div class="login-card">

      <!-- Title -->
      <h1 class="login-title">Login to RentSphere</h1>
      <p class="login-subtitle">Welcome back! Please enter your details.</p>

      <!-- Username input -->
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" />
      </div>

      <!-- Password input -->
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <!-- Login Button -->
      <button class="btn-login" id="loginBtn">Login</button>

      <!-- Register Link (UI only) -->
      <p class="register-link">
      Don't have an account? <a href="#" id="registerLink">Register</a>
      </p>

      <div class="divider">or</div>

      <!-- Back to Home -->
      <a href="#" class="btn-back" id="backToHome">← Back to Home</a>

    </div>
  </div>

  <!-- ── Footer ── -->
  <footer>
    © 2024 RentSphere. All rights reserved.
  </footer>

  <!-- ── JavaScript ── -->
  
    <script src="script.js"></script>

</body>
</html>
